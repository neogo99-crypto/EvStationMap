

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Smart Map Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; }
        #header { background: #1a1a2e; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; position: relative; }
        #map { height: calc(100vh - 70px); width: 100%; }
        .ev-popup { min-width: 220px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .battery-bg { background: #eee; border-radius: 10px; height: 10px; margin: 8px 0; overflow: hidden; }
        .battery-fill { background: #2ecc71; height: 100%; }
        .btn-nav { width: 100%; padding: 10px; background: #1a1a2e; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #1a1a2e; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p>กำลังเชื่อมต่อ Database (400 จุด)...</p>
</div>

<div id="header">
    <h2 style="margin:0; font-size:18px;">⚡ EV NAVIGATOR CHONBURI</h2>
    <div style="font-size:12px;"><span style="color:#2ecc71">● ว่าง</span> | <span style="color:#e74c3c">● ไม่ว่าง</span></div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vShqdPryhVInqMcbJf5wuxVIomfL2UGWx4cXWQSFpQ2krWoXrixlM6RdKgmaI2W86_s1wUjkWvjAkA6/pub?output=csv";  // ** อย่าลืมเปลี่ยนลิงก์นะครับ **
    const map = L.map('map').setView([12.6658, 100.9158], 11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    // ตำแหน่งปัจจุบัน 
    L.marker([12.6658, 100.9158], {
        icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png', iconSize: [35, 35] })
    }).addTo(map).bindPopup("<b>คุณอยู่ที่นี่</b>").openPopup();

    const markersGroup = L.markerClusterGroup();

    function loadData() {
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                console.log("Data Loaded:", results.data[0]); // ดูโครงสร้างข้อมูลใน Console (F12)
                
                results.data.forEach(station => {
                    if (station.Lat && station.Lng) {
                        const status = station.Status || "0";
                        const battery = station.Battery || "0";
                        const isRed = (status == "1");

                        const popupHTML = `
                            <div class="ev-popup">
                                <b>${isRed ? '🔴 ไม่ว่าง' : '🟢 ว่าง'}</b><br>
                                <strong>${station.Name}</strong><br>
                                <small>${station.Provider}</small><hr>
                                กำลังไฟ: ${station.Power}<br>
                                ${isRed ? `ชาร์จอยู่: ${battery}% <div class="battery-bg"><div class="battery-fill" style="width:${battery}%"></div></div>` : ''}
                                <button class="btn-nav" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${station.Lat},${station.Lng}')">นำทาง</button>
                            </div>
                        `;

                        const marker = L.marker([parseFloat(station.Lat), parseFloat(station.Lng)], {
                            icon: new L.Icon({
                                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${isRed ? 'red' : 'green'}.png`,
                                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                                iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                            })
                        }).bindPopup(popupHTML);
                        markersGroup.addLayer(marker);
                    }
                });
                map.addLayer(markersGroup);
                document.getElementById('loader').style.display = 'none';
            },
            error: function() {
                alert("โหลดข้อมูลไม่สำเร็จ! ตรวจสอบลิงก์ CSV");
                document.getElementById('loader').style.display = 'none';
            }
        });
    }

    if(sheetUrl.includes("http")) loadData();
    else { alert("กรุณาใส่ลิงก์ CSV!"); document.getElementById('loader').style.display = 'none'; }
</script>
</body>
</html>
