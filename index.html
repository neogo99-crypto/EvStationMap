<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Route Pro - 3D Perspective Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; overflow: hidden; background: #0f172a; color: white; }
        
        #header { 
            background: #1e293b; color: white; padding: 0 20px; height: 65px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); position: relative; z-index: 2000;
        }

        /* Container สำหรับทำ Perspective */
        #map-container {
            perspective: 1000px; /* กำหนดระยะความลึก */
            width: 100%;
            height: calc(100vh - 65px);
            background: #0f172a;
            overflow: hidden;
        }

        #map { 
            height: 100%; width: 100%; 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom;
        }

        /* คลาสสำหรับเปิดโหมด 3D */
        .map-3d {
            transform: rotateX(35deg) scale(1.1); /* เอียงหน้าจอ 35 องศา */
        }

        .controls { position: absolute; top: 80px; right: 20px; z-index: 1500; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        .btn { padding: 12px 25px; border-radius: 30px; border: none; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; font-family: 'Kanit'; font-size: 14px; }
        
        .btn-3d { background: linear-gradient(135deg, #6366f1, #a855f7); } /* ปุ่ม 3D */
        .btn-dest { background: #ef4444; }
        .btn-list { background: #3b82f6; display: none; } 
        .btn-clear { background: #475569; display: none; }
        
        /* Popup Styling */
        .ev-popup { min-width: 240px; color: #1e293b; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin-bottom: 8px; color: white; font-weight: 600; }
        .bg-red { background: #ef4444; }
        .bg-green { background: #10b981; }
        .bg-blue { background: #3b82f6; }
        .btn-gmaps { 
            display: block; text-align: center; background: #4b89dc; color: white; 
            text-decoration: none; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; font-weight: 600; 
        }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2100; display: none; backdrop-filter: blur(4px); }
        #stationPopup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 440px; max-height: 75vh; background: white; color: #1e293b;
            z-index: 2200; border-radius: 20px; display: none; flex-direction: column; overflow: hidden;
        }
        .popup-header { background: #1e293b; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .popup-body { overflow-y: auto; padding: 15px; background: #f8fafc; }
        .station-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #e2e8f0; cursor: pointer; background: white; border-radius: 12px; margin-bottom: 10px; }
        
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>

    <div id="header">
        <div><h2 style="margin:0; font-size:18px; letter-spacing: 1px;">⚡ EV ROUTE NAVIGATOR</h2></div>
        <div style="font-size: 12px; font-weight: 300;">
            <span style="color:#10b981">● ว่าง</span> | <span style="color:#ef4444">● ไม่ว่าง</span> | <span style="color:#3b82f6">🔧 อู่ซ่อม</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-3d" onclick="toggle3D()">🕶️ โหมด 3D View</button>
        <button id="destBtn" class="btn btn-dest" onclick="toggleSelection()">📍 เลือกจุดหมาย</button>
        <button id="listBtn" class="btn btn-list" onclick="showStationList()">📂 รายการสถานี</button>
        <button id="clearBtn" class="btn btn-clear" onclick="clearRoute()">🗑 ล้างเส้นทาง</button>
    </div>

    <div id="overlay" onclick="closeStationList()"></div>
    <div id="stationPopup">
        <div class="popup-header">
            <h3 style="margin:0; font-size:16px;">สถานีใกล้เส้นทาง</h3>
            <span style="cursor:pointer; font-size:24px;" onclick="closeStationList()">×</span>
        </div>
        <div id="stationListContainer" class="popup-body"></div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <script>
        // อัปเดต GID ตามที่คุณแจ้งมาครับ
        const STATION_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vShqdPryhVInqMcbJf5wuxVIomfL2UGWx4cXWQSFpQ2krWoXrixlM6RdKgmaI2W86_s1wUjkWvjAkA6/pub?gid=0&output=csv";
        const GARAGE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vShqdPryhVInqMcbJf5wuxVIomfL2UGWx4cXWQSFpQ2krWoXrixlM6RdKgmaI2W86_s1wUjkWvjAkA6/pub?gid=824797195&output=csv";

        const START_POS = [13.2835, 100.9248];
        const map = L.map('map', { zoomControl: false }).setView(START_POS, 14);

        // เปลี่ยนเป็นแผนที่แบบ Dark Mode เพื่อความเท่และดู Pro ขึ้น
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const carIcon = L.icon({ 
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', 
            iconSize: [45, 45], iconAnchor: [22, 22]
        });
        const garageIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3039/3039487.png',
            iconSize: [35, 35], iconAnchor: [17, 35], popupAnchor: [0, -30]
        });

        L.marker(START_POS, { icon: carIcon }).addTo(map).bindPopup("<b>🚗 ตำแหน่งรถของคุณ</b>");

        let routingControl = null, isSelecting = false, stationsData = [], currentRoutePolyline = null, destMarker = null;

        // ฟังก์ชันเปิด/ปิดโหมด 3D
        function toggle3D() {
            const mapEl = document.getElementById('map');
            mapEl.classList.toggle('map-3d');
            // ทำการ invalidateSize เพื่อให้แผนที่คำนวณพิกัดใหม่เมื่อมีการย่อ/ขยายจากการเอียง
            setTimeout(() => map.invalidateSize(), 800);
        }

        function loadData() {
            // โหลดสถานี
            Papa.parse(STATION_URL, { download: true, header: true, complete: (res) => {
                res.data.forEach(st => {
                    if(st.Lat && st.Lng) {
                        const isOcc = (st.Status == "1");
                        const m = L.marker([st.Lat, st.Lng], {
                            icon: L.icon({ iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${isOcc?'red':'green'}.png`, iconSize: [25, 41], iconAnchor: [12, 41] })
                        }).addTo(map);
                        m.bindPopup(`<div class="ev-popup"><div class="status-badge ${isOcc?'bg-red':'bg-green'}">${isOcc?'ไม่ว่าง':'ว่าง'}</div><h3>${st.Name}</h3><b>แบรนด์:</b> ${st.Provider}<br><b>หัวชาร์จ:</b> ${st.Connectors}<br><a href="https://www.google.com/maps?q=${st.Lat},${st.Lng}" target="_blank" class="btn-gmaps">📍 นำทางไปสถานี</a></div>`);
                        st.marker = m; stationsData.push(st);
                    }
                });
            }});
            // โหลดอู่ซ่อม (Sheet 2 - GID: 824797195)
            Papa.parse(GARAGE_URL, { download: true, header: true, complete: (res) => {
                res.data.forEach(gr => {
                    if(gr.Lat && gr.Lng) {
                        const m = L.marker([gr.Lat, gr.Lng], { icon: garageIcon }).addTo(map);
                        m.bindPopup(`<div class="ev-popup"><div class="status-badge bg-blue">🔧 อู่ซ่อม EV</div><h3>${gr.Name}</h3><b>เวลาทำการ:</b> ${gr.WorkTime}<br><b>หมายเหตุ:</b> ${gr.Remark}<br><a href="https://www.google.com/maps?q=${gr.Lat},${gr.Lng}" target="_blank" class="btn-gmaps">📍 นำทางไปอู่ซ่อม</a></div>`);
                    }
                });
            }});
        }

        function toggleSelection() {
            isSelecting = !isSelecting;
            document.getElementById('destBtn').innerText = isSelecting ? "🖱 คลิกเลือกบนแผนที่" : "📍 เลือกจุดหมาย";
            map.getContainer().style.cursor = isSelecting ? 'crosshair' : '';
        }

        map.on('click', (e) => {
            if (!isSelecting) return;
            if (routingControl) map.removeControl(routingControl);
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.marker(e.latlng).addTo(map);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(START_POS), L.latLng(e.latlng)],
                createMarker: () => null,
                lineOptions: { styles: [{ color: '#3b82f6', weight: 6, opacity: 0.8 }] }
            }).on('routesfound', (ev) => {
                currentRoutePolyline = L.polyline(ev.routes[0].coordinates);
                document.getElementById('listBtn').style.display = 'block';
                document.getElementById('clearBtn').style.display = 'block';
            }).addTo(map);
            toggleSelection();
        });

        function clearRoute() {
            if (routingControl) map.removeControl(routingControl);
            if (destMarker) map.removeLayer(destMarker);
            currentRoutePolyline = null;
            document.getElementById('listBtn').style.display = 'none';
            document.getElementById('clearBtn').style.display = 'none';
        }

        function showStationList() {
            if (!currentRoutePolyline) return;
            const container = document.getElementById('stationListContainer');
            container.innerHTML = "";
            let filtered = [];
            stationsData.forEach(st => {
                const p = L.latLng(st.Lat, st.Lng);
                let minD = Infinity;
                currentRoutePolyline.getLatLngs().forEach(c => { let d = map.distance(p, c); if (d < minD) minD = d; });
                const distFromStart = map.distance(L.latLng(START_POS), p) / 1000;
                if (minD / 1000 <= 4) filtered.push({...st, distFromStart});
            });
            filtered.sort((a,b) => a.distFromStart - b.distFromStart);
            filtered.forEach(st => {
                const item = document.createElement('div');
                item.className = 'station-item';
                item.innerHTML = `<div><span style="color:${st.Status=="1"?'#ef4444':'#10b981'}">●</span> <strong>${st.Provider}</strong><br><small>${st.Name}</small></div><b>${st.distFromStart.toFixed(1)} กม.</b>`;
                item.onclick = () => { map.flyTo([st.Lat, st.Lng], 15); st.marker.openPopup(); closeStationList(); };
                container.appendChild(item);
            });
            document.getElementById('stationPopup').style.display = 'flex';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeStationList() { document.getElementById('stationPopup').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
        
        loadData();
    </script>
</body>
</html>
