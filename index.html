<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Station Live Demo - Chonburi</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background: #f0f2f5; }
        
        #header { 
            background: #1a1a2e; color: white; padding: 0 20px; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            position: relative; z-index: 1000;
        }

        #map { height: calc(100vh - 60px); width: 100%; }

        /* Popup Styling */
        .ev-popup { min-width: 220px; font-family: 'Kanit', sans-serif; }
        .status-header { display: flex; align-items: center; margin-bottom: 10px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .dot-green { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .dot-red { background: #e74c3c; box-shadow: 0 0 8px #e74c3c; }
        
        .progress-container { background: #eee; border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: #3498db; height: 100%; transition: width 0.5s; }
        
        .info-box { background: #f8f9fa; padding: 8px; border-radius: 6px; font-size: 13px; margin-bottom: 5px; }
        .btn-nav { 
            width: 100%; margin-top: 10px; padding: 10px; 
            background: #1a1a2e; color: white; border: none; border-radius: 5px; cursor: pointer;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #2ecc71; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:15px">กำลังจำลองสถานะสถานีชาร์จ 400 จุด...</p>
    </div>

    <div id="header">
        <h2>⚡ EV LIVE STATUS DEMO</h2>
        <div style="font-size: 12px; text-align: right;">
            <span style="color:#2ecc71">● ว่าง</span> | <span style="color:#e74c3c">● ไม่ว่าง</span>
        </div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <script>
        // --- CONFIG ---
        const sheetUrl = "วาง_LINK_CSV_ที่นี่"; 
        
        // ตำแหน่งเริ่มต้นของคุณ (จำลองสัตหีบ)
        const myLocation = [12.6658, 100.9158]; 
        const map = L.map('map').setView(myLocation, 11);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // ไอคอนสำหรับตำแหน่งของคุณ
        const userIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3603/3603850.png',
            iconSize: [45, 45],
            iconAnchor: [22, 45],
            popupAnchor: [0, -40]
        });

        // เพิ่มหมุดตำแหน่งปัจจุบัน
        L.marker(myLocation, { icon: userIcon }).addTo(map)
            .bindPopup("<b>📍 ตำแหน่งของคุณ</b><br>กำลังค้นหาสถานีโดยรอบ").openPopup();

        const markersGroup = L.markerClusterGroup();

        // ฟังก์ชันสุ่มหมุด แดง/เขียว
        function getStatusIcon(status) {
            const color = status === 0 ? 'green' : 'red';
            return new L.Icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });
        }

        function loadEVData() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    results.data.forEach(station => {
                        if(station.Lat && station.Lng && !isNaN(station.Lat)) {
                            // 1. สุ่มสถานะ: 0 = ว่าง (เขียว), 1 = ไม่ว่าง (แดง)
                            const isOccupied = Math.floor(Math.random() * 2); 
                            const chargePercent = isOccupied ? Math.floor(Math.random() * 99) + 1 : 0;
                            
                            const statusText = isOccupied ? "ไม่ว่าง (Occupied)" : "ว่าง (Available)";
                            const statusClass = isOccupied ? "dot-red" : "dot-green";

                            const popupHTML = `
                                <div class="ev-popup">
                                    <div class="status-header">
                                        <div class="status-dot ${statusClass}"></div>
                                        <strong>${statusText}</strong>
                                    </div>
                                    <h3>${station.Name}</h3>
                                    <div class="info-box">
                                        <b>Provider:</b> ${station.Provider}<br>
                                        <b>Connectors:</b> ${station.Connectors}<br>
                                        <b>Power:</b> ${station.Power}
                                    </div>
                                    
                                    ${isOccupied ? `
                                        <div style="font-size:12px; margin-top:10px;">ความคืบหน้าการชาร์จ: ${chargePercent}%</div>
                                        <div class="progress-container">
                                            <div class="progress-bar" style="width: ${chargePercent}%"></div>
                                        </div>
                                    ` : `<div style="color:#2ecc71; font-size:12px; margin:10px 0;">✓ พร้อมใช้งานทันที</div>`}

                                    <button class="btn-nav" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${station.Lat},${station.Lng}')">
                                        🚗 นำทางไปสถานีนี้
                                    </button>
                                </div>
                            `;

                            const marker = L.marker([parseFloat(station.Lat), parseFloat(station.Lng)], { 
                                icon: getStatusIcon(isOccupied) 
                            }).bindPopup(popupHTML);

                            markersGroup.addLayer(marker);
                        }
                    });

                    map.addLayer(markersGroup);
                    document.getElementById('loader').style.display = 'none';
                }
            });
        }

        if(sheetUrl.startsWith("http")) loadEVData();
    </script>
</body>
</html>
