<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging Station Map (MVP)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #header { background: #1a1a2e; color: white; padding: 15px 20px; text-align: center; }
        /* กำหนดขนาดของแผนที่ให้เต็มหน้าจอ */
        #map { height: calc(100vh - 60px); width: 100%; }
        
        /* ตกแต่งหน้าต่าง Popup */
        .ev-popup h3 { margin: 0 0 10px 0; color: #0f3460; font-size: 16px; border-bottom: 2px solid #e94560; padding-bottom: 5px;}
        .ev-popup .provider { font-weight: bold; color: #e94560; margin-bottom: 10px; font-size: 12px; }
        .connector-item { background: #f1f1f1; padding: 8px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center;}
        .type { font-weight: bold; color: #333; }
        .power { background: #4caf50; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .power.ac { background: #2196f3; }
    </style>
</head>
<body>

    <div id="header">
        <h2>⚡ EV Charging Map Explorer</h2>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
    // 1. กำหนดจุดศูนย์กลางแผนที่ (ซูมออกมาหน่อยให้เห็นภาพกว้างของชลบุรี)
    const map = L.map('map').setView([13.3100, 100.9500], 10);

    // 2. นำเข้าชั้นข้อมูลแผนที่ (ใช้ CartoDB Positron จะดูหรูหราและสะอาดตาสำหรับงานนำเสนอ)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // 3. ข้อมูลสถานีชาร์จจำลอง (เพิ่มจำนวนและค่าย)
    const evStations = [
        { id: 1, name: "Central Plaza Chonburi", provider: "EA Anywhere", lat: 13.3396, lng: 100.9745, color: "blue", connectors: [{ type: "CCS2 (DC)", power: "150kW" }, { type: "AC Type 2", power: "22kW" }] },
        { id: 2, name: "PTT Station - Bang Saen", provider: "EV Station PluZ", lat: 13.2875, lng: 100.9150, color: "green", connectors: [{ type: "CCS2 (DC)", power: "120kW" }, { type: "CHAdeMO (DC)", power: "50kW" }] },
        { id: 3, name: "Robinson Lifestyle Chonburi", provider: "PEA VOLTA", lat: 13.4111, lng: 101.0347, color: "purple", connectors: [{ type: "CCS2 (DC)", power: "100kW" }] },
        { id: 4, name: "Tesco Lotus Amata Nakorn", provider: "EVolt", lat: 13.4355, lng: 101.0022, color: "orange", connectors: [{ type: "AC Type 2", power: "22kW" }] },
        { id: 5, name: "Shell Recharge - Bypass Chonburi", provider: "Shell Recharge", lat: 13.3750, lng: 101.0120, color: "red", connectors: [{ type: "CCS2 (DC)", power: "180kW" }] },
        { id: 6, name: "J-Park Nihon Mura Sriracha", provider: "EA Anywhere", lat: 13.1510, lng: 100.9820, color: "blue", connectors: [{ type: "AC Type 2", power: "7kW" }] },
        { id: 7, name: "PTT Station - Laem Chabang", provider: "EV Station PluZ", lat: 13.0850, lng: 100.9250, color: "green", connectors: [{ type: "CCS2 (DC)", power: "120kW" }] },
        { id: 8, name: "Pattaya Terminal 21", provider: "EleX by EGAT", lat: 12.9502, lng: 100.8900, color: "yellow", connectors: [{ type: "CCS2 (DC)", power: "120kW" }, { type: "AC Type 2", power: "22kW" }] },
        { id: 9, name: "Bangchak Station - Sriracha", provider: "MG Super Charge", lat: 13.1720, lng: 100.9310, color: "darkred", connectors: [{ type: "CCS2 (DC)", power: "50kW" }] },
        { id: 10, name: "7-Eleven Chonburi Park", provider: "7-EV", lat: 13.3550, lng: 100.9880, color: "darkgreen", connectors: [{ type: "AC Type 2", power: "11kW" }] }
    ];

    // 4. ฟังก์ชันสร้างไอคอนหมุดตามสี
    function createIcon(color) {
        return new L.Icon({
            iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
    }

    // 5. วนลูปสร้างหมุด
    evStations.forEach(station => {
        let popupContent = `<div class="ev-popup">
            <h3>${station.name}</h3>
            <div class="provider">ผู้ให้บริการ: <b>${station.provider}</b></div>
            <div style="margin-bottom:5px;"><b>ข้อมูลทางเทคนิค:</b></div>`;
        
        station.connectors.forEach(conn => {
            let powerClass = conn.type.includes('AC') ? 'power ac' : 'power';
            popupContent += `
                <div class="connector-item">
                    <span class="type">${conn.type}</span>
                    <span class="${powerClass}">${conn.power}</span>
                </div>`;
        });
        popupContent += `</div>`;

        L.marker([station.lat, station.lng], { icon: createIcon(station.color) })
            .addTo(map)
            .bindPopup(popupContent);
    });
</script>
</body>
</html>
